<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* Mobile First Design */
        body {
            background-color: antiquewhite;
            color: rgb(168, 149, 124);
            line-height: 1.7;
            margin: 0;
        }

        h1 {
            padding: 1rem;
            text-align: center;
            color: rgb(213, 139, 42);
        }

        #pagefooter {
            border-top: 1px solid silver;
            background-color: rgb(253, 241, 226);
            padding: 1rem;
        }

        #pagefooter>p {
            border: 1px solid silver;
            padding: 1rem;
        }

        #pagefooter>article {
            border: 1px solid silver;
            padding: 1rem;
        }

        /* Font Awesome Styles */

        i {
            color: rgb(213, 139, 42);
            font-size: 1.2rem;
            margin-left: .3rem;
            margin-right: .3rem;
        }

        i.fa-paw {
            transform: rotate(45deg);
        }

    </style>

</head>
<body>
    <h1>Footer</h1>
    <footer id="pagefooter">
        <p>
            <i class="fa-solid fa-paw"></i> Paw & Whiskers <br>
            Mad with <i class="fa-solid fa-heart"></i> for fury friends
        </p>

        <article>
            <i class="fa-solid fa-phone"></i> 559-935-7520 <br>
            <i class="fa-solid fa-envelope"></i> info@pawsandwiskers.com <br>
            <i class="fa-solid fa-location-dot"></i> 750 Van Ness St., Colinga, CA 93210
        </article>

    </footer>
</body>

</html>
