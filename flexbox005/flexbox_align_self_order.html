<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Justify-Content</title>
    <style>
        h1,
        h2 {
            text-align: center;
        }

        #container001 {
            border: 5px solid black;
            background-color: crimson;
            margin: 1rem;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            height: 700px;
        }

        #one {
            background: white;
        }

        #two {
            background: green;
            align-self: flex-start;
        }

        #three {
            background: purple;
            order: -1;
        }

        #four {
            background: blue;
            align-self: flex-end;
            order: 1;
        }

        #five {
            background: orange;
        }


        .box {
            border: 1px solid black;
            background-color: lightgreen;
            width: 100px;
            height: 100px;
            padding: .5rem;
        }

        @media screen and (min-width:800px) {

            body {
                background-color: lightslategrey;
            }

        }

        @media screen and (min-width:1000px) {

            body {
                background-color: brown;
            }

        }
    </style>
</head>

<body>
    <h1>Flexbox</h1>
    <h2>Flexbox Children</h2>
    <h2>Align-self and Order</h2>

    <h2>Container001</h2>
    <div id="container001">
        <div class="box" id="one">Item001</div>
        <div class="box" id="two">Item002</div>
        <div class="box" id="three">Item003</div>
        <div class="box" id="four">Item004</div>
        <div class="box" id="five">Item005</div>
    </div>

</body>

</html>
