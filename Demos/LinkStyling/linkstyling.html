<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Styling</title>
    <style>
        div{
            height:200px;
            width:200px;
            border:1px solid silver;
            text-align:center;
            padding:2rem;
            margin:auto;
        }
        #ps5{background-color: purple;}
        #johnny{background-color: blue;}

        a
        {
        color:red;
        }
        #ps5>a
        {
            color: white;
        }
        #johnny>a
        {
            color: green;
        }
    </style>

</head>
<body>
    <h1>Link Styling</h1>
    <div>
        <a href="https://www.xbox.com/en-US?scrlybrkr=2db4145a">xbox</a>
    </div>

    <div id="ps5">
        <a href="https://www.playstation.com/en-us/ps5/">ps5</a>
    </div>

    <div id="johnny">
        <a href="https://www.nintendo.com/switch/">switch</a>
    </div>

</body>
</html>
