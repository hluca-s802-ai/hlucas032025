<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar Image</title>
    <style>
        body{background-color: darkorange;}
        h1{
            text-align:center;
            background-color: black;
            color: white;
            border: 2px solid white;
        }
        h1:hover   
        {
            background-color: white;
            color: black;
            
            

            




            display:block;
            margin:auto;
            transform:scale(.5);
            transition:all 2s;  
        } 
        img:hover
        {
            transform:scale(1);
        }
    </style>
</head>
<body>
    
    <h1>Oscar Image</h1>

    <img src="oscarimage.png" alt="Oscar the Hornd Toad">
</body>
</html>
