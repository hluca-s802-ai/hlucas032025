<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Keyframes - From To</title>


<style>
	body
	{
		font-family:"Lucida Grande", "Lucida Sans Unicode", "Lucida Sans", "DejaVu Sans", Verdana, "sans-serif";
	}
h1
	{text-align:center;}
	
div
{
	color:white;
	margin:auto;
	margin-bottom:40px;
	padding:10px;
}
div.box
{
	width:200px;
	height:200px;
	background-color:steelblue;
}
div#one
{
	border: 5px solid black;
    animation-name: rounder;
	animation-duration: 2000ms;
	animation-iteration-count: 20;
	animation-direction: alternate;
}

@keyframes rounder
{
	from
	{
		background-color: steelblue;
		border-radius: 0px;
        transform: scale(1);
	}

	to
	{
		background-color: lime;
		border-radius: 50%;
		
	}
}


div#two
{

}
div#three
{

}
</style>

</head>

<body>
<h1> Keyframes - From To</h1>

<div class="box" id="one">
</div>


<div class="box" id="two">
</div>


<div class="box" id="three">
</div>



</body>
</html>
