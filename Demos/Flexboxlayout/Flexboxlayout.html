<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>
    <style>
        body{background-color: blueviolet;}
        #wrapper{
            border: 3px solid white;
            max-width: 1024px;
            margin: auto;
        }
        div{
            background-color: lightblue;
            min-height: 100px;
            border: 1px solid black ;
        }
        #flexbox001
        {
            display: flex;
        }
        #one{
            flex-basis: 50%;
            background-color: aqua;}
        #two{
            flex-basis: 50%;
            background-color: cadetblue;}
        #flexbox002{display: flex;}
        #three{flex-basis: 25%;background-color: chocolate;}
        #four{flex-basis: 50%;background-color: cornflowerblue;}
        #five{flex-basis: 25%;background-color: darkgray;}
        #flexbox003
        {
            display: flex;
        }
        #six, #seven, #eight, #nine
        {
            flex-basis:25%;
        }
        #seven{background-color: bisque;}
    </style>
</head>
<body>
    <div id="wrapper">
    
<div id="flexbox001">
            <div id="one">One</div>
            <div id="two">Two</div>
</div>    


<div id="flexbox002">
            <div id="three">Three</div>
            <div id="four">Four</div>
            <div id="five">Five</div>
</div>


<div id="flexbox003">
            <div id="six">Six</div>
            <div id="seven">Seven</div>
            <div id="eight">Eight</div>
            <div id="nine">Nine</div>
</div>

    </div>
    <!-- end the wrapper -->
</body>
</html>
